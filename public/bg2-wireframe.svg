<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <style>
    .bg { fill: #001108; }
    .wireframe-main { stroke: #00ff66; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .wireframe-secondary { stroke: #00aa44; stroke-width: 1; fill: none; opacity: 0.6; }
    .wireframe-light { stroke: #ffffff; stroke-width: 2; fill: none; opacity: 0.9; }
  </style>

  <!-- High-Contrast Dark Green Background -->
  <rect class="bg" width="1000" height="650" />

  <!-- CEILING BEAMS (REPEATING DIAGONALS) -->
  <g class="wireframe-main">
    <!-- Beam 1 (Top Right Foreground) -->
    <polygon points="460,0 930,120 930,240 460,50" />
    <line x1="930" y1="120" x2="1000" y2="100" />
    <line x1="930" y1="240" x2="1000" y2="190" />
    
    <!-- Beam 2 -->
    <polygon points="250,0 720,240 720,360 250,50" />
    <line x1="250" y1="0" x2="460" y2="0" />
    <line x1="250" y1="50" x2="460" y2="50" />
    
    <!-- Beam 3 -->
    <polygon points="50,0 520,350 520,430 50,40" />
    
    <!-- Beam 4 -->
    <polygon points="0,50 320,430 320,490 0,110" />
    
    <!-- Beam 5 -->
    <polygon points="0,170 170,440 170,490 0,220" />
  </g>

  <!-- VERTICAL LIGHT COLUMNS & WALL PANELS -->
  <g class="wireframe-light">
    <!-- Vertical strip 1 -->
    <line x1="930" y1="120" x2="930" y2="480" />
    <!-- Vertical strip 2 -->
    <line x1="720" y1="240" x2="720" y2="560" />
    <!-- Vertical strip 3 -->
    <line x1="520" y1="350" x2="520" y2="600" />
    <!-- Vertical strip 4 -->
    <line x1="320" y1="430" x2="320" y2="600" />
  </g>
  
  <g class="wireframe-secondary">
    <!-- Intermediate wall lines behind beams -->
    <line x1="840" y1="200" x2="840" y2="520" />
    <line x1="620" y1="300" x2="620" y2="580" />
    <line x1="430" y1="400" x2="430" y2="600" />
  </g>

  <!-- STAIRS & SEATING STRUCTURES (STEPPED GEOMETRY) -->
  <g class="wireframe-main">
    <!-- Top Floating Tier (Right) -->
    <polygon points="820,495 1000,455 1000,500 820,540" />
    
    <!-- Mid Floating Tier (Center-Right) -->
    <polygon points="650,550 830,520 830,560 650,590" />
    
    <!-- Lower Floating Tier (Center-Left) -->
    <polygon points="510,590 670,565 670,600 510,625" />
    
    <!-- Bottom Foreground Bleachers / Steps -->
    <path d="M 0,580 L 1000,580 M 0,595 L 1000,595 M 0,610 L 1000,610 M 0,625 L 1000,625 M 0,640 L 1000,640" />
    
    <!-- Diagonal perspective baselines for tiers -->
    <line x1="220" y1="560" x2="510" y2="590" />
    <line x1="220" y1="580" x2="510" y2="610" />
  </g>

  <!-- CEILING FIXTURES / LIGHT SPOTS -->
  <g class="wireframe-secondary">
    <!-- Small rectangular lights under beams -->
    <polygon points="790,200 820,210 810,220 780,210" />
    <polygon points="580,300 610,310 600,320 570,310" />
    <polygon points="430,385 460,392 452,400 422,392" />
    <polygon points="335,445 360,451 354,458 329,451" />
  </g>
</svg>
